name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - name: Install exact dependencies
        working-directory: typescript
        run: bun install --frozen-lockfile
      - name: Verify signed contract
        working-directory: typescript
        run: bun run verify:contract
      - name: Regenerate public types
        working-directory: typescript
        run: bun run generate:types -- --contract ../contracts/2026.07/public-sdk-contract.json
      - name: Reject generated drift
        run: git diff --exit-code -- typescript/src/generated/public-api.ts typescript/src/contract.ts
      - name: Check public boundary
        run: bun run scripts/validate-public-surface.ts
      - name: Typecheck
        working-directory: typescript
        run: bun run typecheck
      - name: Test
        working-directory: typescript
        run: bun test
      - name: Build ESM and CommonJS
        working-directory: typescript
        run: bun run build
      - name: Check browser bundle and package contents
        run: bun run scripts/validate-public-surface.ts --built
      - name: Node ESM and CommonJS smoke test
        run: node examples/node-smoke.mjs
      - name: Audit dependencies
        working-directory: typescript
        run: bun audit
