name: Publish npm release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@11.5.1
      - name: Install exact dependencies
        working-directory: typescript
        run: bun install --frozen-lockfile
      - name: Verify, test and build
        working-directory: typescript
        run: |
          bun run verify:contract
          bun run generate:types -- --contract ../contracts/2026.07/public-sdk-contract.json
          git diff --exit-code -- src/generated/public-api.ts src/contract.ts
          bun run typecheck
          bun test
          bun run build
      - name: Validate release tag and public boundary
        run: bun run scripts/validate-release.ts "${GITHUB_REF_NAME}"
      - name: Publish release candidate with OIDC
        if: contains(github.ref_name, '-rc.')
        working-directory: typescript
        run: npm publish --access public --tag next
      - name: Publish stable with OIDC
        if: ${{ !contains(github.ref_name, '-rc.') }}
        working-directory: typescript
        run: npm publish --access public --tag latest
