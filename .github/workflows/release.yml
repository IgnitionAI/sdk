name: Publish npm release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing signed release tag to retry
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@11.18.0
      - name: Verify OIDC runtime identity
        run: |
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          npm --version
          echo "repository=${GITHUB_REPOSITORY} workflow=release.yml ref=${RELEASE_TAG} environment=npm"
      - name: Exchange GitHub OIDC for a package-scoped npm token
        run: bun run scripts/exchange-npm-oidc.ts
      - name: Install exact dependencies
        working-directory: typescript
        run: bun install --frozen-lockfile
      - name: Verify, test and build
        working-directory: typescript
        run: |
          bun run verify:contract
          bun run generate:types -- --contract ../contracts/2026.07/public-sdk-contract.json
          git diff --exit-code -- src/generated/public-api.ts src/contract.ts
          bun run typecheck
          bun test
          bun run build
      - name: Validate release tag and public boundary
        run: bun run scripts/validate-release.ts "${RELEASE_TAG}"
      - name: Publish release candidate with OIDC
        if: contains(env.RELEASE_TAG, '-rc.')
        working-directory: typescript
        run: npm publish --access public --tag next --provenance
      - name: Publish stable with OIDC
        if: ${{ !contains(env.RELEASE_TAG, '-rc.') }}
        working-directory: typescript
        run: npm publish --access public --tag latest --provenance
      - name: Remove ephemeral npm credentials
        if: always()
        run: rm -f "${RUNNER_TEMP}/ignition-sdk-oidc.npmrc"
